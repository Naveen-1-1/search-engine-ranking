<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Naveen" />
    <meta
      name="description"
      content="Tune ranking profiles and review search index health metrics in SearchX."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <title>SearchX | Search Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/search-admin.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container page-shell">
        <a class="navbar-brand fw-bold" href="/">SearchX</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Search</a>
          <a class="nav-link" href="/content-admin.html">Content Admin</a>
          <a class="nav-link active" href="/search-admin.html">Search Admin</a>
          <a class="nav-link" href="/about.html">How to Use</a>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4">
      <div class="row g-4">
        <section class="col-lg-5">
          <div class="surface-card p-4">
            <p class="eyebrow mb-1">Search Admin</p>
            <h1 class="h3">Tune ranking profiles</h1>
            <p class="muted-copy">
              Change how title matches, tags, popularity, and freshness
              influence result order.
            </p>
            <form id="profileForm" class="row g-3">
              <input id="profileId" type="hidden" />
              <div class="col-12">
                <label class="form-label" for="profileName">Profile name</label>
                <input id="profileName" class="form-control" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="profileDescription"
                  >Description</label
                >
                <textarea
                  id="profileDescription"
                  class="form-control"
                  rows="2"
                ></textarea>
              </div>
              <div class="col-12 weight-grid">
                <label
                  >Title
                  <input
                    id="weightTitle"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Summary
                  <input
                    id="weightSummary"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Body
                  <input
                    id="weightBody"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Tags
                  <input
                    id="weightTags"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Source
                  <input
                    id="weightSource"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Popularity
                  <input
                    id="weightPopularity"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
                <label
                  >Recency
                  <input
                    id="weightRecency"
                    class="form-control"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                /></label>
              </div>
              <div class="col-12 form-check">
                <input
                  id="profileActive"
                  class="form-check-input"
                  type="checkbox"
                />
                <label class="form-check-label" for="profileActive"
                  >Make this the active ranking profile</label
                >
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">
                  Save profile
                </button>
                <button
                  id="newProfileButton"
                  class="btn btn-outline-secondary"
                  type="button"
                >
                  New profile
                </button>
              </div>
            </form>
            <div id="profileMessage" class="mt-3" aria-live="polite"></div>
          </div>
        </section>

        <section class="col-lg-7">
          <div class="surface-card p-4 mb-4">
            <p class="eyebrow mb-1">Ranking Profiles</p>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Active</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="profilesTable"></tbody>
              </table>
            </div>
          </div>

          <div class="surface-card p-4">
            <p class="eyebrow mb-1">Metrics</p>
            <h2 class="h4">Search and document health</h2>
            <div id="metrics" class="row g-3" aria-live="polite"></div>
          </div>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/search-admin-page.js"></script>
  </body>
</html>
