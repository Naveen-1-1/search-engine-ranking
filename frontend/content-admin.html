<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SearchX | Content Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/content-admin.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container page-shell">
        <a class="navbar-brand fw-bold" href="/">SearchX</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/">Search</a>
          <a class="nav-link active" href="/content-admin.html"
            >Content Admin</a
          >
          <a class="nav-link" href="/search-admin.html">Search Admin</a>
          <a class="nav-link" href="/about.html">How to Use</a>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4">
      <div class="row g-4">
        <section class="col-lg-5">
          <div class="surface-card p-4">
            <p class="eyebrow mb-1">Content Admin</p>
            <h1 class="h3">Manage searchable records</h1>
            <p class="muted-copy">
              Create or edit records. Published records are added to the search
              index automatically.
            </p>
            <form id="recordForm" class="row g-3">
              <input id="recordId" type="hidden" />
              <div class="col-12">
                <label class="form-label" for="title">Title</label>
                <input id="title" class="form-control" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="summary">Summary</label>
                <textarea
                  id="summary"
                  class="form-control"
                  rows="2"
                  required
                ></textarea>
              </div>
              <div class="col-12">
                <label class="form-label" for="body">Body</label>
                <textarea
                  id="body"
                  class="form-control"
                  rows="5"
                  required
                ></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="category">Category</label>
                <input id="category" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="source">Source</label>
                <input id="source" class="form-control" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="tags">Tags</label>
                <input
                  id="tags"
                  class="form-control"
                  placeholder="mongodb, search, ranking"
                />
                <p class="form-hint mb-0">Separate tags with commas.</p>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="publishedAt"
                  >Published date</label
                >
                <input
                  id="publishedAt"
                  class="form-control"
                  type="date"
                  required
                />
              </div>
              <div class="col-md-3">
                <label class="form-label" for="popularity">Popularity</label>
                <input
                  id="popularity"
                  class="form-control"
                  min="0"
                  max="1000"
                  type="number"
                  value="100"
                />
              </div>
              <div class="col-md-3">
                <label class="form-label" for="status">Status</label>
                <select id="status" class="form-select">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                  <option value="archived">Archived</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="author">Author</label>
                <input id="author" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="readingMinutes"
                  >Reading minutes</label
                >
                <input
                  id="readingMinutes"
                  class="form-control"
                  min="1"
                  max="60"
                  type="number"
                  value="5"
                />
              </div>
              <div class="col-12">
                <label class="form-label" for="sourceUrl">Source URL</label>
                <input id="sourceUrl" class="form-control" type="url" />
              </div>
              <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">
                  Save record
                </button>
                <button
                  id="resetForm"
                  class="btn btn-outline-secondary"
                  type="button"
                >
                  Clear
                </button>
              </div>
            </form>
            <div id="formMessage" class="mt-3" aria-live="polite"></div>
          </div>
        </section>

        <section class="col-lg-7">
          <div class="surface-card p-4">
            <div
              class="d-flex justify-content-between align-items-start gap-3 mb-3"
            >
              <div>
                <p class="eyebrow mb-1">Corpus</p>
                <h2 class="h4 mb-0">Recent records</h2>
              </div>
              <button
                id="reindexButton"
                class="btn btn-warning btn-sm"
                type="button"
              >
                Rebuild index
              </button>
            </div>
            <div id="adminMessage" class="mb-3" aria-live="polite"></div>
            <div class="table-responsive">
              <table class="table admin-table align-middle">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Category</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="recordsTable"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/content-admin-page.js"></script>
  </body>
</html>
