<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SearchX | Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/search.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container page-shell">
        <a class="navbar-brand fw-bold" href="/">SearchX</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="mainNav" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="/">Search</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/content-admin.html">Content Admin</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/search-admin.html">Search Admin</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about.html">How to Use</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4">
      <section class="hero-panel p-4 p-lg-5 mb-4">
        <p class="eyebrow text-white-50 mb-2">Custom search engine</p>
        <div class="row align-items-end g-4">
          <div class="col-lg-7">
            <h1 class="display-5 fw-semibold">
              Find ranked records across the SearchX corpus.
            </h1>
            <p class="lead mb-0">
              Search uses a custom inverted index, autocomplete, filters, and
              configurable ranking weights.
            </p>
          </div>
          <div class="col-lg-5">
            <form id="searchForm" class="position-relative">
              <label class="form-label" for="searchInput"
                >Search keywords</label
              >
              <div class="input-group input-group-lg">
                <input
                  id="searchInput"
                  class="form-control search-input"
                  name="q"
                  autocomplete="off"
                  placeholder="Try mongodb ranking"
                  type="search"
                />
                <button class="btn btn-warning px-4" type="submit">
                  Search
                </button>
              </div>
              <div
                id="suggestions"
                class="suggestions-menu"
                aria-live="polite"
              ></div>
            </form>
          </div>
        </div>
      </section>

      <section class="surface-card p-3 p-lg-4 mb-4">
        <form id="filterForm" class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label" for="categoryFilter">Category</label>
            <select id="categoryFilter" class="form-select" name="category">
              <option value="">All categories</option>
              <option>Web Development</option>
              <option>Databases</option>
              <option>Search</option>
              <option>Cloud</option>
              <option>Security</option>
              <option>UX Design</option>
              <option>Data Science</option>
              <option>DevOps</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="sourceFilter">Source</label>
            <select id="sourceFilter" class="form-select" name="source">
              <option value="">All sources</option>
              <option>Developer Blog</option>
              <option>API Docs</option>
              <option>Course Notes</option>
              <option>Community Forum</option>
              <option>Research Digest</option>
              <option>Product Docs</option>
              <option>Newsroom</option>
              <option>Archive</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label" for="tagFilter">Tag</label>
            <input
              id="tagFilter"
              class="form-control"
              name="tag"
              placeholder="mongodb"
            />
          </div>
          <div class="col-md-2">
            <label class="form-label" for="fromFilter">From</label>
            <input
              id="fromFilter"
              class="form-control"
              name="from"
              type="date"
            />
          </div>
          <div class="col-md-2">
            <label class="form-label" for="toFilter">To</label>
            <input id="toFilter" class="form-control" name="to" type="date" />
          </div>
        </form>
      </section>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <p class="eyebrow mb-1">Results</p>
          <h2 id="resultHeading" class="h4 mb-0">
            Start with a keyword search
          </h2>
        </div>
        <span id="rankingProfile" class="badge text-bg-secondary"
          >Ranking: Default</span
        >
      </div>

      <section id="results" class="row g-3" aria-live="polite"></section>
      <nav class="mt-4" aria-label="Search result pages">
        <ul id="pagination" class="pagination"></ul>
      </nav>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/search-page.js"></script>
  </body>
</html>
